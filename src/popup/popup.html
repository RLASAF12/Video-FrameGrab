<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video FrameGrab</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🎬</div>
                <h1>FrameGrab</h1>
            </div>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Idle</span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="capture">Capture</div>
            <div class="tab" data-tab="history">History</div>
        </div>

        <!-- Capture View -->
        <div id="captureView" class="view active">
            <!-- Live Counter -->
            <div class="counter-display" id="counterDisplay">
                <div class="counter-number" id="counterNumber">0</div>
                <div class="counter-label">screenshots captured</div>
            </div>

            <!-- Settings Accordion -->
            <details class="settings-accordion">
                <summary>Advanced Settings</summary>
                <div class="settings-group">
                    <div class="setting-row">
                        <label for="intervalInput">Capture every</label>
                        <div class="input-group">
                            <input type="number" id="intervalInput" min="1" max="120" value="6" step="1">
                            <span class="input-suffix">sec</span>
                        </div>
                    </div>

                    <div class="setting-row">
                        <label for="autoCaptureToggle">Auto-capture on play</label>
                        <label class="toggle">
                            <input type="checkbox" id="autoCaptureToggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>

                    <div class="setting-row">
                        <label>Time Range</label>
                        <div class="time-range-group">
                            <input type="text" id="startRange" placeholder="00:00" class="time-input">
                            <span>-</span>
                            <input type="text" id="endRange" placeholder="MM:SS" class="time-input">
                        </div>
                    </div>

                    <div class="setting-row">
                        <label for="fileNameTemplate">Filename Template</label>
                        <input type="text" id="fileNameTemplate" class="text-input" value="{title}_{time}_{index}"
                            title="{title}, {time}, {index}, {date}">
                    </div>

                    <div class="setting-row">
                        <label for="includeContactSheetToggle" title="Generate an image grid of all frames">Add Contact
                            Sheet</label>
                        <label class="toggle">
                            <input type="checkbox" id="includeContactSheetToggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </details>

            <!-- Controls -->
            <div class="controls" style="margin-top: 12px;">
                <button id="startBtn" class="btn btn-start">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <polygon points="3,1 13,8 3,15" />
                    </svg>
                    Start Capture
                </button>
                <button id="stopBtn" class="btn btn-stop" disabled>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <rect x="2" y="2" width="12" height="12" rx="2" />
                    </svg>
                    Stop &amp; Download ZIP
                </button>
            </div>

            <!-- Error message -->
            <div class="error-msg" id="errorMsg" style="display:none; margin-top: 10px;"></div>
        </div>

        <!-- History View -->
        <div id="historyView" class="view" style="display:none;">
            <div class="history-list" id="historyList">
                <!-- populated via JS -->
            </div>
            <button id="clearHistoryBtn" class="btn btn-secondary" style="margin-top: 10px; width: 100%;">Clear
                History</button>
        </div>

    </div>

    <script src="popup.js"></script>
</body>

</html>
